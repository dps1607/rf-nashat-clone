{% extends "base.html" %}
{% block title %}Audit Log — Nashat Admin{% endblock %}

{% block content %}
<div class="audit-layout">
  <div class="audit-header">
    <h1 class="audit-title">Audit Log</h1>
    <div class="audit-controls">
      <select id="event-filter" class="audit-filter">
        <option value="">All events</option>
        <option value="login_success">Login success</option>
        <option value="login_failure">Login failure</option>
        <option value="logout">Logout</option>
        <option value="yaml_save">Config save</option>
        <option value="test_query">Test query</option>
        <option value="folder_selection_saved">Folder selection</option>
        <option value="inventory_refreshed">Inventory refresh</option>
        <option value="startup">Startup</option>
      </select>
      <button class="btn-secondary btn-sm" id="audit-refresh">Refresh</button>
    </div>
  </div>

  <div class="audit-table-wrap">
    <table class="audit-table" id="audit-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Event</th>
          <th>User</th>
          <th>IP</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="audit-body">
        <tr><td colspan="5" class="audit-loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<style>
  .audit-layout {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }
  .audit-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .audit-title {
    font-family: var(--serif, 'Cormorant Garamond', serif);
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--navy, #142A40);
    margin: 0;
  }
  .audit-controls {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .audit-filter {
    padding: 0.35rem 0.5rem;
    border: 1px solid var(--gray-light, #D2D0D2);
    border-radius: 6px;
    font-family: var(--sans, 'Inter', sans-serif);
    font-size: 0.8rem;
    color: var(--charcoal, #3A393A);
    background: var(--white, #FFFFFF);
  }
  .audit-table-wrap {
    border: 1px solid var(--gray-light, #D2D0D2);
    border-radius: 8px;
    overflow-x: auto;
    background: var(--white, #FFFFFF);
  }
  .audit-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--sans, 'Inter', sans-serif);
    font-size: 0.8rem;
  }
  .audit-table th {
    text-align: left;
    padding: 0.6rem 0.75rem;
    background: var(--off-white, #FBFBFB);
    color: var(--navy, #142A40);
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    border-bottom: 1px solid var(--gray-light, #D2D0D2);
  }
  .audit-table td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--off-white, #FBFBFB);
    color: var(--charcoal, #3A393A);
    vertical-align: top;
  }
  .audit-table tr:hover td {
    background: var(--rose-pale, #faeeec);
  }
  .audit-event-badge {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 500;
    background: var(--gray-light, #D2D0D2);
    color: var(--charcoal, #3A393A);
  }
  .audit-details {
    font-size: 0.7rem;
    color: var(--gray, #8C8589);
    max-width: 300px;
    word-break: break-word;
  }
  .audit-loading {
    text-align: center;
    color: var(--gray, #8C8589);
    padding: 2rem;
  }
  .audit-empty {
    text-align: center;
    color: var(--gray, #8C8589);
    padding: 2rem;
    font-style: italic;
  }
</style>

<script>
(function () {
  'use strict';

  var body = document.getElementById('audit-body');
  var filter = document.getElementById('event-filter');
  var refreshBtn = document.getElementById('audit-refresh');

  loadEvents();

  filter.addEventListener('change', loadEvents);
  refreshBtn.addEventListener('click', loadEvents);

  function loadEvents() {
    var action = filter.value;
    var url = '/admin/api/audit/events?n=200';
    if (action) url += '&action=' + encodeURIComponent(action);

    body.innerHTML = '<tr><td colspan="5" class="audit-loading">Loading...</td></tr>';

    fetch(url)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var events = data.events || [];
        if (events.length === 0) {
          body.innerHTML = '<tr><td colspan="5" class="audit-empty">No events found</td></tr>';
          return;
        }
        body.innerHTML = '';
        for (var i = 0; i < events.length; i++) {
          var ev = events[i];
          var tr = document.createElement('tr');

          var tdTime = document.createElement('td');
          tdTime.textContent = (ev.timestamp || '').replace('T', ' ').substring(0, 19);
          tr.appendChild(tdTime);

          var tdEvent = document.createElement('td');
          var badge = document.createElement('span');
          badge.className = 'audit-event-badge';
          badge.textContent = ev.event || '-';
          tdEvent.appendChild(badge);
          tr.appendChild(tdEvent);

          var tdUser = document.createElement('td');
          tdUser.textContent = ev.user || '-';
          tr.appendChild(tdUser);

          var tdIp = document.createElement('td');
          tdIp.textContent = ev.ip || '-';
          tr.appendChild(tdIp);

          var tdDetails = document.createElement('td');
          tdDetails.className = 'audit-details';
          var details = ev.details || {};
          var detailStr = Object.keys(details).map(function (k) {
            return k + ': ' + JSON.stringify(details[k]);
          }).join(', ');
          tdDetails.textContent = detailStr || '-';
          tr.appendChild(tdDetails);

          body.appendChild(tr);
        }
      })
      .catch(function (err) {
        body.innerHTML = '<tr><td colspan="5" class="audit-loading">Error: ' + err.message + '</td></tr>';
      });
  }
})();
</script>
{% endblock %}
